<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meteoport</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="logo-meteoport.png" alt="Meteoport logo" class="logo">
      <p class="tagline">Wave, wind and coastal conditions</p>
    </div>

    <nav class="topnav">
      <a href="https://magulles.github.io/">Main site</a>
    </nav>
  </header>

  <main class="app-layout">
    <aside class="sidebar">
      <h2>Selected location</h2>

      <div class="time-control">
        <label for="hour-slider">
          Forecast time: <span id="hour-label">--</span>
        </label>
        <input type="range" id="hour-slider" min="0" max="119" value="0">
      </div>

      <div id="info-panel" class="info-panel">
        <p><strong>Name:</strong> Click a marker</p>
        <p><strong>Wave:</strong> --</p>
        <p><strong>Wind:</strong> --</p>
        <p><strong>Status:</strong> --</p>
      </div>
    </aside>

    <section class="map-section">
      <div id="map"></div>
    </section>
  </main>

  <section class="bottom-chart">
    <div class="chart-card">
    <h3 id="chart-title">Marine forecast</h3>
      <canvas id="wave-chart"></canvas>
    </div>
  </section>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
